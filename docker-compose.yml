services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports: ["1883:1883"]
    volumes:
      - ./mosquitto/config:/mosquitto/config:ro
      - mosquitto-data:/mosquitto/data

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: volmax
      POSTGRES_PASSWORD: volmax
      POSTGRES_DB: edge
    volumes: [db-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volmax"]
      interval: 5s
      retries: 10

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg2://volmax:volmax@db:5432/edge
      MQTT_HOST: mosquitto
    depends_on:
      db: {condition: service_healthy}
      mosquitto: {condition: service_started}
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: volmax
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [db]

volumes:
  mosquitto-data:
  db-data:
